<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{
            display: block;
            background-color: darkcyan;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: lightblue;
            padding: 20px;
            
            margin: auto; /* deixar box no centro */
        }

        /*a {
            border-width: 5px;
            border-style: solid;
            border-color: lightgreen;
        } */

    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inlive-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
